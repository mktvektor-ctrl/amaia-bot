<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>amaIA · Vektor MKT</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:system-ui,sans-serif; }
.phone { width:340px; border-radius:22px; overflow:hidden; border:1px solid #333; display:flex; flex-direction:column; }
.ph { background:#075E54; padding:12px 16px; display:flex; align-items:center; gap:10px; }
.av { width:40px; height:40px; border-radius:50%; background:#128C7E; display:flex; align-items:center; justify-content:center; font-weight:600; font-size:12px; color:#fff; flex-shrink:0; }
.ph .name { color:#fff; font-size:14px; font-weight:500; }
.ph .st { color:rgba(255,255,255,0.75); font-size:11px; }
.body { background:#E5DDD5; height:500px; overflow-y:auto; padding:12px 10px; display:flex; flex-direction:column; gap:6px; scroll-behavior:smooth; }
.msg { max-width:80%; padding:8px 11px 5px; border-radius:10px; font-size:13px; line-height:1.6; word-break:break-word; }
.bot { background:#fff; border-radius:10px 10px 10px 2px; align-self:flex-start; color:#111; }
.usr { background:#DCF8C6; border-radius:10px 10px 2px 10px; align-self:flex-end; color:#111; }
.time { font-size:10px; color:#aaa; margin-top:3px; text-align:right; }
.usr .time { color:#6a9f6a; }
.typing-msg { background:#fff; border-radius:10px 10px 10px 2px; align-self:flex-start; padding:10px 14px; }
.dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:#bbb; margin:0 2px; animation:bl 1.3s infinite; }
.dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
@keyframes bl{0%,80%,100%{opacity:.25}40%{opacity:1}}
.handoff { background:#FFF8E1; border-left:3px solid #FFC107; padding:9px 11px; font-size:12px; color:#555; align-self:flex-start; max-width:82%; border-radius:0 10px 10px 0; }
.inp-row { background:#f0f0f0; display:flex; gap:8px; padding:8px 10px; align-items:center; border-top:1px solid #ddd; }
.inp-row input { flex:1; border-radius:20px; border:none; padding:8px 14px; font-size:13px; background:#fff; outline:none; }
.send-btn { background:#25D366; border:none; border-radius:50%; width:36px; height:36px; cursor:pointer; color:#fff; font-size:15px; display:flex; align-items:center; justify-content:center; }
</style>
</head>
<body>
<div class="phone">
  <div class="ph">
    <div class="av">aI</div>
    <div><div class="name">amaIA · Vektor MKT</div><div class="st" id="st">en línea</div></div>
  </div>
  <div class="body" id="chat"></div>
  <div class="inp-row">
    <input id="inp" placeholder="Escribe un mensaje..." onkeydown="if(event.key==='Enter')send()"/>
    <button class="send-btn" onclick="send()">&#10148;</button>
  </div>
</div>
<script>
const chat = document.getElementById('chat');
const inp  = document.getElementById('inp');
const st   = document.getElementById('st');
let history = [];
let busy = false;

const ts = () => { const d=new Date(); return d.getHours()+':'+(d.getMinutes()<10?'0':'')+d.getMinutes(); };

function addMsg(text, who){
  const d=document.createElement('div');
  d.className='msg '+(who==='bot'?'bot':'usr');
  d.innerHTML=text+'<div class="time">'+ts()+(who==='usr'?' ✓✓':'')+'</div>';
  chat.appendChild(d); chat.scrollTop=chat.scrollHeight;
}

function showTyping(ms){
  return new Promise(res=>{
    st.textContent='escribiendo...';
    const d=document.createElement('div');
    d.className='typing-msg'; d.id='typ';
    d.innerHTML='<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
    chat.appendChild(d); chat.scrollTop=chat.scrollHeight;
    setTimeout(()=>{ const t=document.getElementById('typ'); if(t)t.remove(); st.textContent='en línea'; res(); }, ms);
  });
}

function showHandoff(){
  const d=document.createElement('div');
  d.className='handoff';
  d.innerHTML='🔔 <b>Conectando con el equipo…</b><br>Tiempo de respuesta: <b>menos de 10 min</b> (Lun–Vie 9–18h).<br><br>Urgente: <b>+34 600 000 000</b>';
  chat.appendChild(d); chat.scrollTop=chat.scrollHeight;
}

async function send(){
  if(busy) return;
  const text=inp.value.trim(); if(!text) return;
  inp.value=''; busy=true;

  addMsg(text,'usr');
  history.push({role:'user', content:text});

  const wantsHuman=/\b(persona|humano|asesor|hablar con alguien|hablar con una persona|quiero hablar|llamar)\b/i.test(text);
  if(wantsHuman){
    await showTyping(900);
    addMsg('Claro, ahora mismo aviso al equipo 🙌','bot');
    showHandoff();
    busy=false; return;
  }

  const ms=900+Math.min(text.length*10,1400);
  await showTyping(ms);

  try {
    const res=await fetch('/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages: history.slice(-12)})
    });
    const data=await res.json();
    const reply=data.reply||'Un momento, enseguida te respondo 🙏';
    history.push({role:'assistant',content:reply});
    addMsg(reply,'bot');
  } catch(e){
    addMsg('Perdona, tuve un problema técnico. ¿Me lo repites?','bot');
  }
  busy=false;
}

window.onload=async()=>{
  await showTyping(1200);
  const w='¡Hola! Soy amaIA, del equipo de Vektor MKT 👋 ¿En qué te puedo ayudar?';
  addMsg(w,'bot');
  history.push({role:'assistant',content:w});
};
</script>
</body>
</html>
